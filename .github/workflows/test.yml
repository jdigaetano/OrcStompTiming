name: Regression Tests

on:
  push:
    branches: [ main, refactor-architecture ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Playwright
        run: npm install playwright

      - name: Run Headless Tests
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            // Start a local web server to serve the files
            const server = require('http').createServer((req, res) => {
              const fs = require('fs');
              const path = require('path');
              let filePath = '.' + req.url;
              if (filePath === './') filePath = './index.html';
              const extname = path.extname(filePath);
              const contentType = { '.html': 'text/html', '.js': 'text/javascript' }[extname] || 'text/plain';
              fs.readFile(filePath, (error, content) => {
                if (error) { res.writeHead(404); res.end(); }
                else { res.writeHead(200, { 'Content-Type': contentType }); res.end(content, 'utf-8'); }
              });
            }).listen(8080);

            try {
              await page.goto('http://localhost:8080/tests/index.html?ci');
              await page.waitForFunction(() => window.testStatus !== undefined, { timeout: 10000 });
              const status = await page.evaluate(() => window.testStatus);
              console.log('Test Status:', status);
              if (status !== 'SUCCESS') process.exit(1);
            } catch (err) {
              console.error('Testing timed out or failed:', err);
              process.exit(1);
            } finally {
              await browser.close();
              server.close();
            }
          })();
          "
