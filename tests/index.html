<!DOCTYPE html>
<html>
<head>
    <title>OrcStomp Regression Tests</title>
    <style>
        body { font-family: monospace; background: #121212; color: #eee; padding: 20px; }
        .pass { color: #00ff00; }
        .fail { color: #ff0055; font-weight: bold; }
        .test-row { margin-bottom: 5px; border-bottom: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>
    <h1>OrcStomp Regression Suite</h1>
    <div id="results">Running tests...</div>

    <script src="../TimingEngine.js"></script>
    <script>
        const resultsEl = document.getElementById('results');

        function logResult(name, passed, error = "") {
            const div = document.createElement('div');
            div.className = 'test-row';
            div.innerHTML = `<span class="${passed ? 'pass' : 'fail'}">[${passed ? 'PASS' : 'FAIL'}]</span> ${name} ${error}`;
            resultsEl.appendChild(div);
            return passed;
        }

        async function runTests() {
            resultsEl.innerHTML = '';
            let allPassed = true;

            const engine = new TimingEngine();
            await engine.ready;

            // Test 1: Database Initialization
            allPassed &= logResult("DB Initialization", engine.db !== null);

            // Test 2: Save and Retrieve Mapping
            try {
                await engine.saveMapping("TEST_HEX_123", 99);
                const maps = await engine.getMappings();
                const found = maps.find(m => m.chip_hex === "TEST_HEX_123" && m.bib_num === 99);
                allPassed &= logResult("Mapping Storage", found !== undefined);
            } catch (e) {
                allPassed &= logResult("Mapping Storage", false, e.message);
            }

            // Test 3: Race Tracking & Queue Flushing
            try {
                engine.raceStartTime = new Date().toISOString();
                engine.isTrackingRace = true;

                engine.handleIncomingTag("MOCK_TAG_1", -50);

                // Wait for the daemon to flush (250ms interval)
                await new Promise(r => setTimeout(r, 500));

                const reads = await engine.getAllFromStore('race_reads');
                const found = reads.find(r => r.tag_hex === "MOCK_TAG_1");
                allPassed &= logResult("Ingestion Daemon", found !== undefined);
            } catch (e) {
                allPassed &= logResult("Ingestion Daemon", false, e.message);
            }

            // Test 4: Clear Data Logic
            try {
                await engine.clearRaceData();
                const reads = await engine.getAllFromStore('race_reads');
                allPassed &= logResult("Race Data Reset", reads.length === 0);
            } catch (e) {
                allPassed &= logResult("Race Data Reset", false, e.message);
            }

            // Final Status
            const summary = document.createElement('h2');
            summary.innerHTML = allPassed ? "ALL TESTS PASSED" : "TEST SUITE FAILED";
            summary.className = allPassed ? 'pass' : 'fail';
            document.body.appendChild(summary);

            // For GitHub Actions: signal success/failure
            if (window.location.search.includes('ci')) {
                window.testStatus = allPassed ? 'SUCCESS' : 'FAILURE';
            }
        }

        runTests();
    </script>
</body>
</html>
